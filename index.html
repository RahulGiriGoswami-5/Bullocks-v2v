<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sahayika — Your Safety Companion</title>
  <meta name="description" content="Sahayika is a personal safety companion designed to help you feel secure, stay connected with trusted contacts, and access help when you need it.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Theme toggle (floating, no header on landing) -->
  <button id="theme-toggle" class="btn-icon theme-toggle landing-theme-toggle" aria-label="Toggle dark mode">
    <span class="theme-icon-light"><i data-lucide="sun"></i></span>
    <span class="theme-icon-dark"><i data-lucide="moon"></i></span>
  </button>

  <div class="landing-page">

    <!-- Branding -->
    <div class="landing-brand">
      <div class="landing-logo-mark">
        <i data-lucide="shield"></i>
      </div>
      <h1 class="landing-app-name">Sahayika</h1>
      <p class="landing-tagline">Your everyday safety companion</p>
    </div>

    <!-- Auth Card -->
    <div class="auth-card">

      <!-- Tabs: Login / Sign Up -->
      <div class="tabs auth-tabs">
        <button class="tab active" id="tab-login" onclick="return false;">Login</button>
        <button class="tab" id="tab-signup" onclick="return false;">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="form-login" action="#" onsubmit="return false;">
        <div class="form-group">
          <label class="form-label" for="login-email">Email address</label>
          <div class="input-icon-wrapper">
            <i data-lucide="mail" class="input-icon"></i>
            <input type="email" id="login-email" class="form-input" placeholder="you@example.com">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <div class="input-icon-wrapper">
            <i data-lucide="lock" class="input-icon"></i>
            <input type="password" id="login-password" class="form-input" placeholder="Enter your password">
          </div>
        </div>
        <div class="flex items-center justify-between">
          <label class="form-checkbox">
            <input type="checkbox" id="login-remember">
            Remember me
          </label>
          <a href="#" class="text-sm text-yellow" style="font-weight:500;">Forgot password?</a>
        </div>
        <a href="home.html" class="btn btn-turquoise btn-block">Login</a>
        <div class="auth-divider">or continue with</div>
        <button type="button" class="btn btn-outline btn-block">
          <i data-lucide="smartphone"></i>
          Login with Phone
        </button>
      </form>

      <!-- Sign Up Form (hidden by default — no JS to toggle yet, just present) -->
      <!-- In Phase 1 both are visible for skeleton review; toggle logic can come later -->
    </div>

    <footer class="landing-footer">
      <p>SafeSphere &middot; Built for safety, designed with care</p>
    </footer>
  </div>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>lucide.createIcons();</script>
  <script src="js/theme.js"></script>
</body>
</html>
